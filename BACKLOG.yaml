phases:
  - id: phase-1-mvp
    title: "MVP: Watched questions + email alerts"
    description: >
      Email magic-link signup, BYO Anakin API key on onboarding, up to 5 watched
      questions via free-text query, cross-platform matching via Wire actions
      using the user's key, 5-min spread refresh, email alert when spread > 3%.
      Demo-ready polish.
    successCriteria:
      - User signs up via email magic-link; session persists across browser restarts
      - During onboarding, user pastes an Anakin API key; key is encrypted at rest and used only for that user's Wire calls
      - If a user's Anakin key is missing, invalid, or quota-exhausted, dashboard surfaces a clear error and that user's spread refresh is paused
      - User adds up to 5 watched questions by free-text query; matching finds markets across all 4 platforms for ≥3 of 5 seeded test queries
      - Cron updates spreads at least every 5 min per user; spread = max(implied_yes_prob) − min(implied_yes_prob)
      - Email alert sent within 60s of cron run when threshold (default 3%) crossed
      - Dashboard shows watched questions with current spread, last-updated, deeplinks to all 4 platforms
      - ./preview.sh starts service against seeded SQLite (3 test questions, 1 fixture user) and prints http://localhost:3000
      - README quickstart works copy-pasted in <60s
      - Disclaimer "arb ≠ profit; slippage and fees may eat spread" present on every spread view
    status: done
    closeNotes: "All 10 success criteria implementation-complete across 4 sprints. Two human-verification items (live-server Playwright run + real-Wire field-mapping spot-check) deferred at user direction; tracked in .sdlc/PHASE_HUMAN_CHECK.md for Phase-1-close hygiene; can be done in parallel with Phase 2 sprints."

  - id: phase-2-v1.5
    title: "v1.5: Multi-user + smarter matching"
    description: >
      Per-question custom thresholds, web-push notifications, embedding-based
      matching, 7-day spread history chart. Trigger: ≥10 organic signups.
    successCriteria:
      - Two or more users use the system simultaneously with isolated watched lists and isolated Anakin keys
      - Per-question custom threshold (override of global 3%) works end-to-end
      - Web-push notification delivered within 60s of threshold crossing
      - Embedding-based matching beats Phase 1 free-text matching on a seeded eval set (≥80% accuracy)
      - Each question shows a 7-day spread history chart
    status: in_progress

  - id: phase-3-v2
    title: "v2: Paid tier"
    description: >
      Stripe billing, Google SSO, Free (5 questions) / Paid ($19/mo, unlimited)
      plans, custom rule engine. Trigger: 50+ signups with ≥5 asking for paid features.
    successCriteria:
      - Google SSO signup/login works alongside email magic-link
      - Stripe subscription checkout succeeds; webhook flips user to paid plan
      - Paid plan removes 5-question cap; free plan enforces it
      - Custom rule engine evaluates user-authored rules and alerts when matched
      - Downgrade/cancel flow restores free-tier limits without data loss
      - Paid tier never subsidizes Wire credits — billing is for product features only
    status: planning

  - id: phase-4-v2.5
    title: "v2.5: Auto-execution (Power tier)"
    description: >
      $99/mo tier with capital-managed auto-execution against user's own Kalshi
      + Polymarket accounts. Trigger: paid-tier MRR > $1k for 2 months.
    successCriteria:
      - User securely stores Kalshi API key + Polymarket wallet sig (encrypted at rest)
      - Capital-management rules enforced before any order
      - End-to-end test executes paired YES/NO order on Kalshi + Polymarket against testnet
      - Funds never custodied — every order routes through user's connected account
      - Kill switch disables auto-execution immediately without losing in-flight settlement tracking
    status: not_started

epics:
  # ----- Phase 1 epics -----

  - id: epic-foundation
    phase: phase-1-mvp
    title: Foundation
    description: Stack ADR, Wire-integration ADR, app skeleton, preview.sh, README quickstart.
    stories:
      - id: story-stack-decision
        title: Decide the stack
        status: done
        description: >
          Choose runtime, framework, DB (SQLite-seedable for Phase 1), background
          scheduler for 5-min cron, email transport, secrets/encryption, and
          deploy target. Free-tier hosting is a hard requirement; if Vercel +
          NextAuth + Resend + Neon/Supabase free tiers don't fit, justify why.
        priority: P0
        tasks:
          - id: task-stack-adr
            title: Write ADR for stack selection
            owner: architect
            status: done
            attempts: 1
            artifacts:
              - docs/architecture/0001-stack.md
            definitionOfDone:
              - docs/architecture/0001-stack.md exists with Context, Options, Decision, Consequences
              - covers web framework, DB, scheduler, email transport, secret-encryption library, deploy target
              - all chosen services fit free tiers OR the ADR documents why a paid choice is required
              - aligns with PROJECT.md constraints (Architect-decides, demo-ready, BYOC)

      - id: story-wire-integration-adr
        title: Decide how Wire actions are invoked per-user
        status: done
        description: >
          Document how the app calls kl_events, mm_search_markets, pm_get_events,
          rh_get_events using each user's Anakin key — client lib, retry/backoff,
          fixtures for local dev, key-failure handling, fields needed to compute
          implied_yes_prob on each platform.
        priority: P0
        tasks:
          - id: task-wire-adr
            title: ADR for Wire integration + per-user credential scoping
            owner: architect
            status: done
            attempts: 1
            artifacts:
              - docs/architecture/0002-wire-integration.md
            definitionOfDone:
              - docs/architecture/0002-wire-integration.md exists
              - specifies client lib, per-call credential injection from user record, retry/backoff, rate-limit handling, fixture mode for local dev (no live keys)
              - enumerates the fields per platform needed to compute implied_yes_prob (yes ask/bid/midpoint convention picked explicitly)
              - defines the error taxonomy for key-missing / key-invalid / quota-exhausted

      - id: story-skeleton
        title: App skeleton + preview.sh + README
        status: done
        description: >
          Web app boots locally via ./preview.sh against seeded SQLite (3 test
          questions, 1 fixture user with a stub Anakin key). Root URL renders
          a placeholder shell. README quickstart copy-pastes to a running app
          in <60s.
        priority: P1
        tasks:
          - id: task-skeleton-test
            title: Failing tests for skeleton + preview.sh contract
            owner: qa
            status: done
            attempts: 1
            artifacts:
              - tests/skeleton/root-endpoint.test.ts
              - tests/skeleton/seed.test.ts
              - tests/skeleton/preview-sh.spec.ts
              - tests/seeds/queries.yaml
              - package.json
              - tsconfig.json
              - vitest.config.ts
              - playwright.config.ts
            definitionOfDone:
              - tests assert the root endpoint returns 200 with the app shell
              - tests assert ./preview.sh starts the service, prints "http://localhost:3000", and that URL responds
              - tests assert seed loads 3 test questions and 1 fixture user
              - tests fail before implementation
          - id: task-skeleton-impl
            title: Implement minimal app skeleton per ADR
            owner: backend
            status: done
            attempts: 1
            artifacts:
              - app/layout.tsx
              - app/page.tsx
              - app/signin/page.tsx
              - db/schema.ts
              - db/encryption.ts
              - db/client.ts
              - drizzle.config.ts
              - drizzle/0000_even_mysterio.sql
              - scripts/seed.ts
              - instrumentation.ts
              - next.config.ts
              - preview.sh
              - .env.example
              - .gitignore
            definitionOfDone:
              - skeleton tests pass
              - app starts cleanly via runtime command from ADR-0001
          - id: task-preview-sh
            title: preview.sh seeds DB and runs the app
            owner: devops
            status: done
            attempts: 1
            artifacts:
              - preview.sh
            notes: >
              Absorbed by task-skeleton-impl in the same wave; preview.sh was
              authored by the backend agent (sourcing .env, running drizzle
