# tests/seeds/embedding-eval.yaml
#
# Evaluation set for the embedding-based matching pipeline (ADR-0003).
#
# Each entry contains:
#   query       — the free-text question the user would type
#   ground_truth — per-platform ground-truth market IDs
#                  (null for platforms where no market exists)
#
# Accuracy target (from BACKLOG task-embedding-test DoD):
#   ≥ 80% top-1 hit rate across all non-null ground_truth entries.
#
# Source: manually authored based on real Kalshi/Manifold/Polymarket markets.
#   These IDs are representative fixtures — in WIRE_MODE=fixtures the test
#   uses the fixture embedding responses from tests/fixtures/embeddings/.
#   The IDs do not need to correspond to live markets.
#
# Format note: platform entries can be omitted rather than listed as null
# when no market exists for that platform.

eval_queries:
