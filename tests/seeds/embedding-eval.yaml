    query: "Will the Federal Reserve raise interest rates in 2026?"
    ground_truth:
      kalshi: "FED-2026-RAISE"
      manifold: "fed-raise-2026"
      polymarket: "0xfed2026raise"
      robinhood: "rh-fed-2026-raise"

